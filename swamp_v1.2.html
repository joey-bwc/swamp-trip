<style>
:root{--cream:#F5F0E8;--white:#FFFFFF;--olive:#4A5740;--olive-mid:#6B7A5F;--olive-pale:#EDF0EA;--bala:#8B1A1A;--red:#C0392B;--gold:#D4A017;--black:#1C1C1C;--gray:#6B6B6B;--gray-lt:#B0B0B0;--border:#E4E0D8;--border-strong:#C8C0B0;--ff-title:'Bebas Neue',Impact,sans-serif;--ff-body:'Outfit',system-ui,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#F2EEE8}
body{font-family:var(--ff-body);color:var(--black);font-size:16px}
#app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;background:#F2EEE8}
/* PLAYER OVERLAY */
#player-overlay{position:fixed;inset:0;background:rgba(74,87,64,0.97);display:flex;align-items:center;justify-content:center;z-index:1000;flex-direction:column}
.picker-box{text-align:center;padding:24px 20px}
.picker-flag{height:56px;margin-bottom:12px}
.picker-title{font-family:var(--ff-title);font-size:40px;color:var(--white);letter-spacing:3px;line-height:1}
.picker-sub{font-size:13px;color:rgba(255,255,255,0.65);margin-top:4px;margin-bottom:24px}
.picker-prompt{font-size:14px;color:rgba(255,255,255,0.8);font-weight:600;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.8px}
.picker-btns{display:flex;flex-direction:column;gap:10px;width:240px}
.picker-btn{background:var(--white);border:none;border-radius:12px;padding:14px 20px;font-family:var(--ff-body);font-size:16px;font-weight:700;color:var(--olive);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.picker-btn:active{background:var(--olive-pale)}
.picker-hcp{font-size:11px;font-weight:500;color:var(--gray);background:#F0EDE8;padding:2px 8px;border-radius:20px}
/* HEADER */
header{background:transparent;padding:10px 16px 8px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.hdr-left{display:flex;align-items:center;gap:10px}
.swamp-flag{height:40px;width:auto;object-fit:contain}
.hdr-text .app-title{font-family:var(--ff-title);font-size:26px;color:var(--olive);letter-spacing:1.5px;line-height:1;display:block}
.hdr-text .trip-sub{font-size:10px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:0.5px;display:block}
.player-badge-btn{background:var(--olive);color:var(--white);border:none;border-radius:20px;padding:6px 12px;font-family:var(--ff-body);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px}
.player-badge-btn:active{background:var(--olive-mid)}
.admin-toggle-btn{background:rgba(74,87,64,0.12);color:var(--gray);border:1.5px solid var(--border);border-radius:20px;padding:5px 10px;font-family:var(--ff-body);font-size:10px;font-weight:700;cursor:pointer;letter-spacing:0.5px;text-transform:uppercase;transition:all 0.2s}
.admin-toggle-btn.active{background:var(--red);color:var(--white);border-color:var(--red)}
/* MAIN */
main{flex:1;overflow:hidden;position:relative;background:#F2EEE8}
.tab-panel{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 14px 24px;display:none}
.tab-panel.active{display:block}
/* BOTTOM NAV */
.bottom-nav{display:flex;background:var(--white);border-top:2px solid var(--border-strong);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0)}
.nav-btn{flex:1;padding:8px 4px 6px;border:none;background:none;font-family:var(--ff-body);font-size:10px;font-weight:500;color:var(--gray-lt);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color 0.15s}
.nav-btn.active{color:var(--olive)}
.nav-icon{font-size:18px;line-height:1}
.nav-btn.active .nav-icon{transform:scale(1.1)}
/* CARDS */
.card{background:var(--white);border-radius:12px;padding:14px;margin-bottom:11px;box-shadow:0 1px 4px rgba(28,28,28,0.08),0 0 0 1px var(--border)}
.section-title{font-family:var(--ff-title);font-size:18px;letter-spacing:0.8px;color:var(--black);margin-bottom:11px}
/* TRIP LEADERBOARD */
.lb-header-trip{display:grid;grid-template-columns:1fr 44px 44px 30px 40px;font-size:9px;font-weight:700;color:var(--gray-lt);text-transform:uppercase;letter-spacing:0.5px;padding:0 0 6px;border-bottom:1px solid var(--border);margin-bottom:4px;gap:4px}
.lb-row-trip{display:grid;grid-template-columns:1fr 44px 44px 30px 40px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);gap:4px}
.lb-row-trip:last-child{border-bottom:none}
.lb-me{background:#FAFFF8;border-radius:8px;padding:8px 6px;margin:0 -6px}
.lbh-name{display:flex;align-items:center;gap:4px;min-width:0}
.lb-medal{font-size:14px;flex-shrink:0}
.lb-pname{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-phcp{font-size:10px;color:var(--gray-lt);flex-shrink:0}
.lbh-net,.lbh-gross,.lbh-bird,.lbh-skins{font-size:13px;font-weight:700;text-align:center}
/* DAILY RESULTS */
.course-day-hdr{display:flex;align-items:center;gap:8px;padding:8px 0 4px;border-top:1px solid var(--border);margin-top:6px}
.course-day-hdr:first-child{border-top:none;margin-top:0}
.day-label{font-size:10px;font-weight:700;color:var(--white);background:var(--olive);padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0}
.course-name-sm{font-size:12px;font-weight:600;color:var(--gray)}
.no-round-yet{font-size:11px;color:var(--gray-lt);padding:4px 0 6px;font-style:italic}
.daily-row{display:grid;grid-template-columns:18px 1fr 70px 80px;align-items:center;padding:5px 0;font-size:12px;gap:6px}
.daily-me{font-weight:700}
.daily-pos{color:var(--gray-lt);font-weight:700}
.daily-player{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.daily-net{font-weight:700;text-align:right}
.daily-gross{color:var(--gray);text-align:right}
/* ENTER ROUND */
.player-banner{font-size:13px;color:var(--gray);font-weight:500}
.form-grp{margin-bottom:14px}
.form-lbl{display:block;font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px}
.form-input,.form-select{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--ff-body);font-size:15px;color:var(--black);background:var(--white);-webkit-appearance:none;appearance:none}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--olive)}
.stroke-dot{color:var(--gold);font-size:9px;vertical-align:super;margin-left:1px}
.sc-entry{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px}
.sc-entry-hdr{display:grid;grid-template-columns:32px 60px 1fr;background:var(--olive);color:rgba(255,255,255,0.8);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;padding:6px 12px;gap:8px}
.sc-divider{background:var(--olive-pale);padding:5px 12px;font-size:10px;font-weight:700;color:var(--olive);display:flex;justify-content:space-between}
.sc-row{display:grid;grid-template-columns:32px 60px 1fr;align-items:center;padding:6px 12px;border-bottom:1px solid var(--border);gap:6px;background:#fff}
.sc-row:last-child{border-bottom:none}
.sc-row:nth-child(even){background:#FAFAF9}
.sc-hole-num{font-size:13px;font-weight:700;color:var(--olive)}
.sc-mid-col{display:flex;align-items:center}
.sc-right-col{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.sc-inline-grp{display:flex;align-items:center;gap:6px}
.sc-inline-lbl{font-size:9px;font-weight:700;color:var(--gray-lt);text-transform:uppercase;letter-spacing:0.4px;width:34px;text-align:right;flex-shrink:0}
.par-badge{display:inline-block;padding:1px 5px;border-radius:4px;font-size:10px;font-weight:700}
.pb-3{background:#E3EFF8;color:#1A5C8B}.pb-4{background:var(--olive-pale);color:var(--olive)}.pb-5{background:#F2EBD8;color:#7A5C20}
.stepper{display:flex;align-items:center}
.step-btn{width:30px;height:30px;border:1.5px solid var(--border);background:var(--white);font-size:16px;font-weight:600;color:var(--gray);cursor:pointer;display:flex;align-items:center;justify-content:center}
.step-btn:first-child{border-radius:8px 0 0 8px}.step-btn:last-child{border-radius:0 8px 8px 0}
.step-btn:active{background:var(--olive-pale)}
.step-score{width:36px;height:30px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;border-top:1.5px solid var(--border);border-bottom:1.5px solid var(--border);transition:background 0.12s,color 0.12s}
.sc-totals{display:flex;justify-content:space-between;padding:8px 12px;background:var(--olive-pale);font-size:12px;font-weight:600;color:var(--olive)}
.submit-btn{width:100%;padding:15px;background:var(--olive);color:var(--white);border:none;border-radius:12px;font-family:var(--ff-title);font-size:22px;letter-spacing:1.5px;cursor:pointer;margin-top:4px}
.submit-btn:active{opacity:0.85}
.submitted-card{border:2px solid var(--olive);background:#F8FFF8}
.re-enter-btn{margin-top:12px;background:none;border:1.5px solid var(--olive);color:var(--olive);border-radius:8px;padding:8px 16px;font-family:var(--ff-body);font-size:13px;font-weight:600;cursor:pointer;width:100%}
/* SKINS */
.skin-total-card{flex:1;background:var(--olive-pale);border-radius:10px;padding:10px 6px;text-align:center}
.skin-me{background:var(--olive);color:var(--white)}
.skin-me .skin-total-name{color:rgba(255,255,255,0.8)}
.skin-total-num{font-size:28px;font-weight:700;color:var(--olive);line-height:1}
.skin-me .skin-total-num{color:var(--gold)}
.skin-total-name{font-size:11px;font-weight:600;color:var(--gray);margin-top:3px}
.skins-hdr{display:flex;align-items:center;padding:4px 0 6px;border-bottom:1px solid var(--border);font-size:9px;font-weight:700;color:var(--gray-lt);text-transform:uppercase;letter-spacing:0.4px;gap:2px}
.skins-row{display:flex;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);gap:2px;font-size:12px}
.skins-row:last-child{border-bottom:none}
.skin-won{background:#F8FFF8}
.skin-carry{background:#FFFEF0}
.sk-hole{width:22px;font-weight:700;color:var(--olive);flex-shrink:0;font-size:11px}
.sk-player,.sk-score{flex:1;text-align:center}
.sk-score{font-weight:700;width:28px;height:24px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;margin:0 2px;font-size:11px}
.sk-result{width:72px;text-align:right;font-size:11px;flex-shrink:0}
.sk-winner{outline:2px solid var(--gold)}
.skin-won-label{color:var(--olive);font-weight:700}
.skin-push-label{color:var(--gold)}
.skins-course-totals{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.sct-item{font-size:11px;color:var(--gray);background:var(--olive-pale);padding:3px 8px;border-radius:10px}
.sct-me{background:var(--olive);color:var(--white)}
/* STANDINGS */
.std-hdr{display:grid;grid-template-columns:1fr 80px 90px 30px;font-size:9px;font-weight:700;color:var(--gray-lt);text-transform:uppercase;letter-spacing:0.4px;padding:0 0 6px;border-bottom:1px solid var(--border);gap:4px;margin-bottom:4px}
.std-row{display:grid;grid-template-columns:1fr 80px 90px 30px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);gap:4px;font-size:12px}
.std-row:last-child{border-bottom:none}
.std-me{background:#FAFFF8;border-radius:6px;padding:7px 4px;margin:0 -4px}
.std-player{font-weight:600}
.std-gross,.std-net{font-weight:700}
.std-bird{text-align:center}
.mini-sc-wrap{margin-top:6px;padding:6px 0;border-top:1px dashed var(--border)}
.delete-round-btn{margin-top:8px;width:100%;padding:7px;background:none;border:1.5px solid var(--red);color:var(--red);border-radius:8px;font-family:var(--ff-body);font-size:12px;font-weight:700;cursor:pointer;letter-spacing:0.3px}
.delete-round-btn:active{background:var(--red);color:var(--white)}
.mini-sc-me{background:var(--olive-pale);border-radius:8px;padding:6px 8px;margin:4px 0}
.mini-sc-name{font-size:10px;font-weight:700;color:var(--olive);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.4px}
.sc-mini{display:grid;grid-template-columns:repeat(9,1fr);gap:3px}
.sc-cell{text-align:center}
.sc-h{font-size:7px;color:var(--gray-lt);font-weight:500}
.sc-s{font-size:11px;font-weight:700;width:20px;height:20px;border-radius:3px;display:flex;align-items:center;justify-content:center;margin:2px auto}
.sc-p{font-size:7px;color:var(--gray-lt)}
.s-eagle{background:var(--gold);color:#fff}.s-birdie{background:var(--olive);color:#fff}.s-par{background:#EEE;color:#555}
.s-bogey{background:#FDECEA;color:var(--red)}.s-double{background:var(--red);color:#fff}.s-worse{background:#8B1A1A;color:#fff}
/* MISC */
.toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--black);color:var(--white);padding:9px 18px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:all 0.25s;z-index:999;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:40px 16px;color:var(--gray)}
.empty h3{font-family:var(--ff-title);font-size:22px;letter-spacing:1px;color:var(--olive);margin-bottom:8px}
.empty p{font-size:13px;line-height:1.5}
</style>
</head>

// FIREBASE STORAGE
// ═══════════════════════════════════════════════
// Firebase is initialized via the module script below.
// _db and _fsLib are set on window after module loads.

async function waitForFirebase(timeout=5000) {
  const start = Date.now();
  while (!window._db) {
    if (Date.now() - start > timeout) throw new Error('Firebase not ready');
    await new Promise(r => setTimeout(r, 50));
  }
}

async function loadAll() {
  // Load current player from localStorage (device-local)
  try {
    const val = localStorage.getItem('swamp-trip-player');
    currentPlayer = val ? JSON.parse(val) : null;
  } catch(e) { currentPlayer = null; }
  // Load rounds from Firestore (shared)
  try {
    await waitForFirebase();
    const { collection, getDocs, query, orderBy } = window._fsLib;
    const q = query(collection(window._db, 'rounds'), orderBy('timestamp', 'asc'));
    const snap = await getDocs(q);
    allRounds = [];
    snap.forEach(d => allRounds.push(d.data()));
  } catch(e) { allRounds = []; }
}

async function savePlayer(p) {
  currentPlayer = p;
  try { localStorage.setItem('swamp-trip-player', JSON.stringify(p)); } catch(e) {}
}

async function saveRounds() {
  // Individual rounds are saved on submit — this is a no-op now
}

async function saveRoundToFirebase(round) {
  await waitForFirebase();
  const { doc, setDoc } = window._fsLib;
  const id = round.player + '_' + round.course + '_' + round.timestamp;
  await setDoc(doc(window._db, 'rounds', id), round);
}

async function refreshRounds() {
  try {
    await waitForFirebase();
    const { collection, getDocs, query, orderBy } = window._fsLib;
    const q = query(collection(window._db, 'rounds'), orderBy('timestamp', 'asc'));
    const snap = await getDocs(q);
    allRounds = [];
    snap.forEach(d => allRounds.push(d.data()));
  } catch(e) {}
}

// ═══════════════════════════════════════════════
// HANDICAP & NET SCORING
// ═══════════════════════════════════════════════
function playingHandicap(hcpIndex, courseRating, slope, par) {
  return Math.round(hcpIndex * (slope / 113) + (courseRating - par));
}
function strokesOnHole(ph, holeHcpIndex) {
  if (ph <= 0) return 0;
  if (ph >= 36) return 2;
  if (ph >= 19) return holeHcpIndex <= (ph - 18) ? 2 : 1;
  return holeHcpIndex <= ph ? 1 : 0;
}
function netScoreHole(gross, ph, holeHcpIndex) {
  return gross - strokesOnHole(ph, holeHcpIndex);
}
function getRoundPH(round) {
  const c = COURSES[round.course];
  const p = PLAYERS.find(x => x.name === round.player);
  if (!p || !c) return 0;
  return playingHandicap(p.handicap, c.rating, c.slope, c.par);
}
function netTotal(round) {
  const c = COURSES[round.course];
  const ph = getRoundPH(round);
  return round.scores.reduce((sum, g, i) => sum + netScoreHole(g, ph, c.hcpIndex[i]), 0);
}
function grossTotal(round) { return round.scores.reduce((a,b)=>a+b,0); }
function overPar(round) { return grossTotal(round) - COURSES[round.course].par; }
function netOverPar(round) { return netTotal(round) - COURSES[round.course].par; }
function birdieCount(round) {
  const c = COURSES[round.course];
  return round.scores.filter((s,i) => s < c.holes[i]).length;
}

function scoreCls(s, p) {
  const d = s-p;
  if(d<=-2) return 's-eagle';
  if(d===-1) return 's-birdie';
  if(d===0)  return 's-par';
  if(d===1)  return 's-bogey';
  if(d===2)  return 's-double';
  return 's-worse';
}
function stepStyle(s, p) {
  const d = s-p;
  if(d<=-2) return 'background:#D4A017;color:#fff';
  if(d===-1) return 'background:#4A5740;color:#fff';
  if(d===0)  return 'background:#F0EEEA;color:#555';
  if(d===1)  return 'background:#FDECEA;color:#C0392B';
  if(d===2)  return 'background:#C0392B;color:#fff';
  return 'background:#8B1A1A;color:#fff';
}
function fmtDate(ds) {
  const d = new Date(ds+'T12:00:00');
  return d.toLocaleDateString('en',{month:'short',day:'numeric'});
}

// ═══════════════════════════════════════════════
// SKINS CALCULATOR (carryover)
// ═══════════════════════════════════════════════
function calcSkins(rounds) {
  // Group rounds by course, find rounds with all 4 players
  // For each course, calculate hole-by-hole net scores
  const byCourse = {};
  COURSE_ORDER.forEach(cid => { byCourse[cid] = []; });
  rounds.forEach(r => { if(byCourse[r.course]) byCourse[r.course].push(r); });

  const results = {}; // courseId -> { skins: [{hole, winner, pot, carryIn}], totals: {player: count} }
  
  COURSE_ORDER.forEach(cid => {
    const courseRounds = byCourse[cid];
    if (courseRounds.length < 2) return; // need at least 2 players
    
    const c = COURSES[cid];
    const skinsList = [];
    const totals = {};
    PLAYERS.forEach(p => totals[p.name] = 0);
    
    let carryover = 0;
    for (let h = 0; h < 18; h++) {
      // Get net scores for this hole from each player who has submitted a round
      const holeScores = courseRounds.map(r => {
        const ph = getRoundPH(r);
        const net = netScoreHole(r.scores[h], ph, c.hcpIndex[h]);
        return { player: r.player, net, gross: r.scores[h] };
      });
      
      const minNet = Math.min(...holeScores.map(x => x.net));
      const winners = holeScores.filter(x => x.net === minNet);
      
      if (winners.length === 1) {
        const pot = 1 + carryover;
        skinsList.push({ hole: h+1, winner: winners[0].player, pot, carryIn: carryover, net: minNet });
        totals[winners[0].player] += pot;
        carryover = 0;
      } else {
        skinsList.push({ hole: h+1, winner: null, pot: 0, carryIn: carryover, tied: winners.map(x=>x.player) });
        carryover++;
      }
    }
    results[cid] = { skins: skinsList, totals, carryover };
  });
  return results;
}

function selectPlayer(name) {

  switchTab('home');
}

// ═══════════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════════
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  document.querySelector('[data-tab="'+tab+'"]').classList.add('active');
  if(tab==='home')     { refreshRounds().then(renderHome); }
  if(tab==='enter')    renderEnterRound();
  if(tab==='skins')    { refreshRounds().then(renderSkins); }
  if(tab==='standings'){ refreshRounds().then(renderStandings); }
}

// ═══════════════════════════════════════════════
// HOME TAB
// ═══════════════════════════════════════════════
function renderHome() {
  const panel = document.getElementById('panel-home');
  const skinResults = calcSkins(allRounds);

  // Trip net standings
  const playerTotals = {};
  PLAYERS.forEach(p => playerTotals[p.name] = {net:0, gross:0, rounds:0, birdies:0, skins:0});
  allRounds.forEach(r => {
    const p = r.player;
    playerTotals[p].net += netOverPar(r);
    playerTotals[p].gross += overPar(r);
    playerTotals[p].rounds++;
    playerTotals[p].birdies += birdieCount(r);
  });
  // Add skins
  COURSE_ORDER.forEach(cid => {
    if(skinResults[cid]) {
      Object.entries(skinResults[cid].totals).forEach(([player, count]) => {
        if(playerTotals[player]) playerTotals[player].skins += count;
      });
    }
  });

  const ranked = PLAYERS.map(p => ({...playerTotals[p.name], name:p.name, hcp:p.handicap}))
    .sort((a,b) => {
      if(a.rounds === 0 && b.rounds === 0) return 0;
      if(a.rounds === 0) return 1;
      if(b.rounds === 0) return -1;
      return a.net - b.net;
    });

  // Rounds played per course
  const roundsByCourse = {};
  COURSE_ORDER.forEach(cid => {
    roundsByCourse[cid] = allRounds.filter(r => r.course === cid);
  });

  let h = '';

  // Trip leaderboard
  h += '<div class="card">'
    + '<div class="section-title">&#127942; Trip Leaderboard</div>'
    + '<div class="lb-header-trip"><span class="lbh-name">Player</span><span class="lbh-net">Net</span><span class="lbh-gross">Gross</span><span class="lbh-bird">&#127921;</span><span class="lbh-skins">Skins</span></div>';
  
  ranked.forEach((p, idx) => {
    const medals = ['&#127945;','&#129352;','&#129353;',''];
    const netStr = p.rounds === 0 ? '—' : (p.net >= 0 ? '+'+p.net : String(p.net));
    const grossStr = p.rounds === 0 ? '—' : (p.gross >= 0 ? '+'+p.gross : String(p.gross));
    const isMe = p.name === currentPlayer;
    h += '<div class="lb-row-trip '+(isMe?'lb-me':'') +'">'
      + '<div class="lbh-name"><span class="lb-medal">'+(medals[idx]||'')+'</span><span class="lb-pname">'+p.name+'</span><span class="lb-phcp"> ('+p.hcp+')</span></div>'
      + '<div class="lbh-net" style="color:'+(p.rounds>0&&p.net<0?'var(--olive)':p.rounds>0&&p.net>0?'var(--red)':'var(--gray-lt)')+'">'+netStr+'</div>'
      + '<div class="lbh-gross">'+grossStr+'</div>'
      + '<div class="lbh-bird">'+(p.rounds>0?p.birdies:'—')+'</div>'
      + '<div class="lbh-skins">'+(p.skins>0?p.skins:p.rounds>0?'0':'—')+'</div>'
      + '</div>';
  });
  h += '</div>';

  // Daily results per course
  h += '<div class="card"><div class="section-title">&#128197; Round Results</div>';
  COURSE_ORDER.forEach((cid, idx) => {
    const c = COURSES[cid];
    const courseRounds = roundsByCourse[cid];
    const dayLabel = 'Day ' + (idx+1);
    h += '<div class="course-day-hdr"><span class="course-name-sm" style="font-weight:700;font-size:13px">'+c.name+'</span></div>';
    if(courseRounds.length === 0) {
      h += '<div class="no-round-yet">Not played yet</div>';
    } else {
      // Sort by net
      const sorted = [...courseRounds].sort((a,b) => netOverPar(a) - netOverPar(b));
      sorted.forEach((r, ri) => {
        const net = netOverPar(r);
        const gross = overPar(r);
        const netStr = net >= 0 ? '+'+net : String(net);
        const grossStr = gross >= 0 ? '+'+gross : String(gross);
        const ph = getRoundPH(r);
        const winner = ri === 0 ? ' &#127881;' : '';
        const isMe = r.player === currentPlayer;
        h += '<div class="daily-row '+(isMe?'daily-me':'')+'">'
          + '<span class="daily-pos">'+(ri+1)+'.</span>'
          + '<span class="daily-player">'+r.player+winner+'</span>'
          + '<span class="daily-net" style="color:'+(net<0?'var(--olive)':net>5?'var(--red)':'var(--black)')+'">Net '+netStr+'</span>'
          + '<span class="daily-gross">'+grossTotal(r)+' ('+grossStr+')</span>'
          + '</div>';
      });
    }
  });
  h += '</div>';

  panel.innerHTML = h;
}

// ═══════════════════════════════════════════════
// ENTER ROUND TAB
// ═══════════════════════════════════════════════
function freshEnterState() {
  return {
    course: COURSE_ORDER[0],
    date: new Date().toISOString().split('T')[0],
    scores: [...COURSES[COURSE_ORDER[0]].holes],
    submitted: false
  };
}

function renderEnterRound() {
  if(!enterState) enterState = freshEnterState();
  const panel = document.getElementById('panel-enter');
  if(!currentPlayer) {
    panel.innerHTML = '<div class="empty"><h3>Select Your Player</h3><p>Tap the name badge above to choose who you are.</p></div>';
    return;
  }

  // Check if player already submitted for this course
  const existing = allRounds.find(r => r.player === currentPlayer && r.course === enterState.course);

  const c = COURSES[enterState.course];
  const holes = c.holes;
  const ph = playingHandicap(PLAYERS.find(p=>p.name===currentPlayer).handicap, c.rating, c.slope, c.par);
  const front = enterState.scores.slice(0,9).reduce((a,b)=>a+b,0);
  const back  = enterState.scores.slice(9).reduce((a,b)=>a+b,0);
  const total = front+back;
  const fP = holes.slice(0,9).reduce((a,b)=>a+b,0);
  const bP = holes.slice(9).reduce((a,b)=>a+b,0);
  const fO=front-fP, bO=back-bP, tO=total-c.par;
  const netTot = netTotal({scores:enterState.scores, course:enterState.course, player:currentPlayer});
  const netOv = netTot - c.par;

  // Course selector
  let courseOpts = '';
  COURSE_ORDER.forEach((cid,i) => {
    const cr = allRounds.find(r=>r.player===currentPlayer&&r.course===cid);
    const done = cr ? ' ✓' : '';
    courseOpts += '<option value="'+cid+'"'+(enterState.course===cid?' selected':'')+'>'+COURSES[cid].name+done+'</option>';
  });

  function scRow(i) {
    const par=holes[i], score=enterState.scores[i];
    const strokes = strokesOnHole(ph, c.hcpIndex[i]);
    const strokeDots = strokes > 0 ? '<span class="stroke-dot">'+('•'.repeat(strokes))+'</span>' : '';
    const pbCls=par===3?'pb-3':par===4?'pb-4':'pb-5';
    return '<div class="sc-row">'
      +'<div class="sc-hole-num">'+(i+1)+strokeDots+'</div>'
      +'<div class="sc-mid-col"><span class="par-badge '+pbCls+'">Par '+par+'</span></div>'
      +'<div class="sc-right-col">'
      +'<div class="sc-inline-grp"><span class="sc-inline-lbl">Score</span>'
      +'<div class="stepper"><button class="step-btn" onclick="adjScoreTrip('+i+',-1)">&#8722;</button>'
      +'<div class="step-score" id="tss-'+i+'" style="'+stepStyle(score,par)+'">'+score+'</div>'
      +'<button class="step-btn" onclick="adjScoreTrip('+i+',1)">+</button></div></div>'
      +'</div></div>';
  }

  let h = '<div class="card" style="margin-bottom:10px">'
    +'<div class="player-banner">Entering scores for <strong>'+currentPlayer+'</strong> &nbsp;·&nbsp; PH: '+ph+'</div>'
    +'<div class="form-grp" style="margin-top:10px;margin-bottom:0"><label class="form-lbl">Course / Day</label>'
    +'<select class="form-select" onchange="changeTripCourse(this.value)">'+courseOpts+'</select></div>'
    +'</div>';

  if(existing) {
    // Already submitted — show summary and option to re-enter
    const net = netOverPar(existing);
    const netStr = net>=0?'+'+net:String(net);
    h += '<div class="card submitted-card">'
      +'<div style="font-size:14px;font-weight:700;color:var(--olive);margin-bottom:8px">&#10003; Round Submitted</div>'
      +'<div style="font-size:13px;color:var(--gray)">'+c.name+'</div>'
      +'<div style="display:flex;gap:16px;margin-top:10px;align-items:flex-end">'
      +'<div><div style="font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.4px">Gross</div><div style="font-size:28px;font-weight:700;color:var(--black)">'+grossTotal(existing)+'</div></div>'
      +'<div><div style="font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.4px">Net</div><div style="font-size:28px;font-weight:700;color:var(--olive)">'+netTot+'</div></div>'
      +'<div><div style="font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.4px">Net +/-</div><div style="font-size:28px;font-weight:700;color:'+(net<0?'var(--olive)':net>5?'var(--red)':'var(--black)')+'">'+netStr+'</div></div>'
      +'</div>'
      +'<button class="re-enter-btn" onclick="reEnterRound()">Edit / Re-enter</button>'
      +'</div>';
    panel.innerHTML = h;
    return;
  }

  h += '<div class="sc-entry">'
    +'<div class="sc-entry-hdr"><span>Hole</span><span>Par</span><span style="text-align:right">Score</span></div>'
    +'<div class="sc-divider"><span>FRONT 9</span><span id="trip-front">'+front+' ('+(fO>=0?'+'+fO:fO)+')</span></div>'
    +[0,1,2,3,4,5,6,7,8].map(scRow).join('')
    +'<div class="sc-divider"><span>BACK 9</span><span id="trip-back">'+back+' ('+(bO>=0?'+'+bO:bO)+')</span></div>'
    +[9,10,11,12,13,14,15,16,17].map(scRow).join('')
    +'<div class="sc-totals"><span>TOTAL &nbsp;·&nbsp; Net '+(netOv>=0?'+'+netOv:netOv)+'</span><span id="trip-total">'+total+' ('+(tO>=0?'+'+tO:tO)+')</span></div>'
    +'</div>';

  h += '<div style="font-size:10px;color:var(--gray-lt);padding:4px 2px 10px">&#8226; Dots next to hole number = strokes you receive (PH '+ph+')</div>';
  h += '<button class="submit-btn" onclick="submitTripRound()">Submit Round</button>';
  h += '<div style="height:24px"></div>';
  panel.innerHTML = h;
}

function adjScoreTrip(i, delta) {
  const par = COURSES[enterState.course].holes[i];
  enterState.scores[i] = Math.max(1, Math.min(14, enterState.scores[i]+delta));
  const cell = document.getElementById('tss-'+i);
  if(cell){ cell.textContent=enterState.scores[i]; cell.style.cssText=stepStyle(enterState.scores[i],par); }
  updateTripTotals();
}
function updateTripTotals() {
  const c = COURSES[enterState.course];
  const f=enterState.scores.slice(0,9).reduce((a,b)=>a+b,0);
  const bk=enterState.scores.slice(9).reduce((a,b)=>a+b,0);
  const t=f+bk;
  const fP=c.holes.slice(0,9).reduce((a,b)=>a+b,0);
  const bP=c.holes.slice(9).reduce((a,b)=>a+b,0);
  const fO=f-fP, bO=bk-bP, tO=t-c.par;
  const netTot=netTotal({scores:enterState.scores,course:enterState.course,player:currentPlayer});
  const netOv=netTot-c.par;
  const fe=document.getElementById('trip-front');
  const be=document.getElementById('trip-back');
  const te=document.getElementById('trip-total');
  if(fe) fe.textContent=f+' ('+(fO>=0?'+'+fO:fO)+')';
  if(be) be.textContent=bk+' ('+(bO>=0?'+'+bO:bO)+')';
  if(te) te.textContent=t+' ('+(tO>=0?'+'+tO:tO)+') · Net '+(netOv>=0?'+'+netOv:netOv);
}
function changeTripCourse(val) {
  enterState.course = val;
  enterState.scores = [...COURSES[val].holes];
  renderEnterRound();
}
function reEnterRound() {
  const idx = allRounds.findIndex(r=>r.player===currentPlayer&&r.course===enterState.course);
  if(idx>=0) allRounds.splice(idx,1);
  renderEnterRound();
}
async function submitTripRound() {
  const score = enterState.scores.reduce((a,b)=>a+b,0);
  const c = COURSES[enterState.course];
  if(score < c.par - 15 || score > c.par + 60){ showToast('Check scores before submitting'); return; }
  const ph = playingHandicap(PLAYERS.find(p=>p.name===currentPlayer).handicap, c.rating, c.slope, c.par);
  const r = {
    id: 'r_'+Date.now(),
    player: currentPlayer,
    course: enterState.course,
    date: enterState.date,
    scores: [...enterState.scores],
    playingHandicap: ph,
    handicapIndex: PLAYERS.find(p=>p.name===currentPlayer).handicap
  };
  // Remove any existing round for this player+course
  allRounds = allRounds.filter(x => !(x.player===r.player && x.course===r.course));
  allRounds.push(r);
  // Add timestamp for Firestore ordering
  r.timestamp = r.timestamp || Date.now();
  await saveRoundToFirebase(r);
  const op = score - c.par;
  const net = netOverPar(r);
  const netStr = net>=0?'+'+net:String(net);
  showToast(currentPlayer+': '+score+' ('+(op>=0?'+'+op:op)+') · Net '+netStr);
  enterState = freshEnterState();
  renderEnterRound();
}

// ═══════════════════════════════════════════════
// SKINS TAB
// ═══════════════════════════════════════════════
function renderSkins() {
  const panel = document.getElementById('panel-skins');
  const skinResults = calcSkins(allRounds);

  let h = '';

  // Skins totals summary
  const totals = {};
  PLAYERS.forEach(p => totals[p.name] = 0);
  COURSE_ORDER.forEach(cid => {
    if(skinResults[cid]) {
      Object.entries(skinResults[cid].totals).forEach(([player, count]) => {
        totals[player] = (totals[player]||0) + count;
      });
    }
  });
  const skinRanked = PLAYERS.map(p=>({name:p.name,total:totals[p.name]})).sort((a,b)=>b.total-a.total);
  
  h += '<div class="card"><div class="section-title">&#129361; Skins Summary</div>'
    + '<div style="display:flex;gap:8px">';
  skinRanked.forEach(p => {
    const isMe = p.name === currentPlayer;
    h += '<div class="skin-total-card '+(isMe?'skin-me':'')+'">'
      +'<div class="skin-total-num">'+p.total+'</div>'
      +'<div class="skin-total-name">'+p.name+'</div>'
      +'</div>';
  });
  h += '</div></div>';

  // Per-course skins
  COURSE_ORDER.forEach((cid, idx) => {
    const c = COURSES[cid];
    const sr = skinResults[cid];
    const courseRounds = allRounds.filter(r=>r.course===cid);
    h += '<div class="card"><div class="section-title">'+c.short+'</div>';
    if(!sr || courseRounds.length < 2) {
      h += '<div style="font-size:12px;color:var(--gray-lt)">Need at least 2 players to calculate skins</div>';
    } else {
      // Player headers
      const players = courseRounds.map(r=>r.player);
      h += '<div class="skins-hdr"><span class="sk-hole">H</span>';
      players.forEach(p => h += '<span class="sk-player" style="'+(p===currentPlayer?'font-weight:700;color:var(--olive)':'')+'">'+p.slice(0,3)+'</span>');
      h += '<span class="sk-result">Result</span></div>';
      
      let carryDisplay = 0;
      sr.skins.forEach(skin => {
        const holeRounds = courseRounds;
        const ph_map = {};
        holeRounds.forEach(r => ph_map[r.player] = getRoundPH(r));
        
        h += '<div class="skins-row '+(skin.winner?'skin-won':skin.carryIn>0?'skin-carry':'')+ '">'
          +'<span class="sk-hole">'+skin.hole+'</span>';
        players.forEach(p => {
          const r = courseRounds.find(x=>x.player===p);
          const ph = ph_map[p]||0;
          const gross = r ? r.scores[skin.hole-1] : '—';
          const net = r ? netScoreHole(gross, ph, c.hcpIndex[skin.hole-1]) : '—';
          const par = c.holes[skin.hole-1];
          const isWinner = skin.winner===p;
          h += '<span class="sk-score '+(r?scoreCls(gross,par):'')+' '+(isWinner?'sk-winner':'')+'">'+net+'</span>';
        });
        if(skin.winner) {
          h += '<span class="sk-result skin-won-label">'+skin.winner.slice(0,4)+' +'+skin.pot+'&#129361;</span>';
        } else {
          h += '<span class="sk-result skin-push-label">Push →'+( carryDisplay+1)+'</span>';
        }
        h += '</div>';
        if(!skin.winner) carryDisplay++; else carryDisplay=0;
      });

      // Course skins totals
      h += '<div class="skins-course-totals">';
      players.forEach(p => {
        const t = sr.totals[p]||0;
        h += '<span class="sct-item '+(p===currentPlayer?'sct-me':'')+'">'+p+': <strong>'+t+'</strong></span>';
      });
      if(sr.carryover>0) h += '<span class="sct-item" style="color:var(--gold)">&#128308; '+sr.carryover+' carrying</span>';
      h += '</div>';
    }
    h += '</div>';
  });

  panel.innerHTML = h;
}

// ═══════════════════════════════════════════════
// STANDINGS TAB
// ═══════════════════════════════════════════════
async function deleteRound(key, player, course) {
  if (!adminMode) return;
  if (!confirm('Delete ' + player + "'s round at " + course + '?')) return;
  try {
    await waitForFirebase();
    const { doc, deleteDoc } = window._fsLib;
    await deleteDoc(doc(window._db, 'rounds', key));
    allRounds = allRounds.filter(r => {
      const rKey = r.player+'_'+r.course+'_'+r.timestamp;
      return rKey !== key;
    });
    showToast(player + "'s round deleted 🗑");
    renderStandings();
  } catch(e) {
    showToast('Error deleting round');
    console.error(e);
  }
}

function renderStandings() {
  const panel = document.getElementById('panel-standings');
  let h = '';

  COURSE_ORDER.forEach((cid, idx) => {
    const c = COURSES[cid];
    const courseRounds = allRounds.filter(r=>r.course===cid);
    h += '<div class="card"><div class="section-title">'+c.name+'</div>';
    if(courseRounds.length===0){
      h += '<div style="font-size:12px;color:var(--gray-lt)">No rounds entered yet</div>';
    } else {
      const sorted = [...courseRounds].sort((a,b)=>netOverPar(a)-netOverPar(b));
      h += '<div class="std-hdr"><span class="std-player">Player</span><span class="std-gross">Gross</span><span class="std-net">Net</span><span class="std-bird">&#127921;</span></div>';
      sorted.forEach((r,ri) => {
        const gross = grossTotal(r);
        const grossOv = overPar(r);
        const net = netTotal(r);
        const netOv = netOverPar(r);
        const birds = birdieCount(r);
        const grossStr = grossOv>=0?'+'+grossOv:String(grossOv);
        const netStr = netOv>=0?'+'+netOv:String(netOv);
        const isMe = r.player===currentPlayer;
        const crown = ri===0 ? ' &#127881;' : '';
        h += '<div class="std-row '+(isMe?'std-me':'')+'">'
          +'<span class="std-player">'+r.player+crown+'</span>'
          +'<span class="std-gross">'+gross+' <span style="font-size:10px;color:var(--gray)">('+grossStr+')</span></span>'
          +'<span class="std-net" style="color:'+(netOv<0?'var(--olive)':netOv>5?'var(--red)':'var(--black)')+'">'+net+' <span style="font-size:10px">('+netStr+')</span></span>'
          +'<span class="std-bird">'+birds+'</span>'
          +'</div>';
      });
      // Mini scorecard for each player
      sorted.forEach(r => {
        const holes = c.holes;
        const ph = getRoundPH(r);
        const isMe = r.player===currentPlayer;
        h += '<div class="mini-sc-wrap '+(isMe?'mini-sc-me':'')+'">'
          +'<div class="mini-sc-name">'+r.player+'</div>'
          +'<div class="sc-mini">';
        for(let i=0;i<18;i++){
          const strokes=strokesOnHole(ph,c.hcpIndex[i]);
          h+='<div class="sc-cell">'
            +'<div class="sc-h">H'+(i+1)+(strokes>0?'<span style="color:var(--gold)">·</span>':'')+'</div>'
            +'<div class="sc-s '+scoreCls(r.scores[i],holes[i])+'">'+r.scores[i]+'</div>'
            +'<div class="sc-p">'+holes[i]+'</div>'
            +'</div>';
        }
        h+='</div>';
        // Admin delete button
        if(adminMode){
          const rKey = r.player+'_'+r.course+'_'+r.timestamp;
          h+='<button class="delete-round-btn" onclick="deleteRound(\''+rKey+'\',\''+r.player+'\',\''+r.course+'\')">🗑 DELETE '+r.player.toUpperCase()+' — '+c.name.toUpperCase()+'</button>';
        }
        h+='</div>';
      });
    }
    h += '</div>';
  });

  panel.innerHTML = h;
}

  await loadAll();
  enterState = freshEnterState();
  if(!currentPlayer) {
    renderPlayerPicker();
  } else {
    document.getElementById('current-player-badge').textContent = currentPlayer;
    document.getElementById('player-overlay').style.display = 'none';
    switchTab('home');
  }
}
init();
